<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
AI Content Studio | Content Intelligence AI
</title>


<link rel="stylesheet" href="css/style.css">


<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">


</head>



<body>



<header>


<div class="container nav">


<div class="logo">

Content Intelligence AI

</div>



<nav>


<a href="index.html">
Home
</a>


<a href="#">
Projects
</a>


<a href="#">
Templates
</a>


<a href="#">
Account
</a>



</nav>


</div>


</header>







<main>


<section class="dashboard-page">


<div class="container">





<div class="dashboard-title">


<h1>
AI Content Studio
</h1>


<p>
Create one idea and transform it into platform-specific content.
</p>


</div>








<div class="workspace-grid">







<!-- ======================
CAMPAIGN BUILDER
====================== -->


<div class="generator-panel">


<h2>
Campaign Brief
</h2>




<label>
Brand
</label>


<input
id="brand"
type="text"
placeholder="Example: Unshaken Co."
>





<label>
Content Idea
</label>


<textarea

id="topic"

placeholder="Example:

Launching our new Christian t-shirt collection.

The message is Man of Faith - Unshaken.

Designed for Christian men and women wanting to wear their faith."

></textarea>







<label>
Audience
</label>


<input

id="audience"

type="text"

placeholder="Christian men and women 25-45"

>







<label>
Campaign Goal
</label>



<select id="goal">


<option>
Brand Awareness
</option>


<option>
Engagement
</option>


<option>
Website Traffic
</option>


<option>
Sales
</option>


<option>
Community Growth
</option>


</select>








<label>
Tone
</label>



<select id="tone">


<option>
Inspirational
</option>


<option>
Professional
</option>


<option>
Educational
</option>


<option>
Bold
</option>


<option>
Friendly
</option>


</select>








<label>
Content Type
</label>



<select id="contentType">


<option>
Product Launch
</option>


<option>
Brand Story
</option>


<option>
Promotion
</option>


<option>
Educational
</option>


<option>
Video Campaign
</option>


</select>









<h3>
Platforms
</h3>





<div class="platform-selector">


<label>

<input 
type="checkbox"
value="Facebook"
checked
>

Facebook

</label>




<label>

<input 
type="checkbox"
value="Instagram"
checked
>

Instagram

</label>




<label>

<input 
type="checkbox"
value="LinkedIn"
checked
>

LinkedIn

</label>




<label>

<input 
type="checkbox"
value="Pinterest"
checked
>

Pinterest

</label>




<label>

<input 
type="checkbox"
value="TikTok"
checked
>

TikTok

</label>




<label>

<input 
type="checkbox"
value="Threads"
checked
>

Threads

</label>




<label>

<input 
type="checkbox"
value="X"
checked
>

X

</label>




<label>

<input 
type="checkbox"
value="YouTube"
checked
>

YouTube

</label>




</div>








<button

id="generateButton"

class="primary-button"

>

Generate Campaign

</button>





</div>









<!-- ======================
RESULTS
====================== -->



<div class="results-panel">


<div class="results-toolbar">


<h2>
Campaign Results
</h2>



<button

id="copyCampaign"

class="copy-button"

>

Copy Entire Campaign

</button>



</div>







<div id="results">



<div class="placeholder">


<h3>
Your AI content will appear here.
</h3>


<p>
Create a campaign brief and generate platform-ready content.
</p>



</div>




</div>






</div>






</div>







</div>


</section>


</main>







<script src="js/dashboard.js"></script>


</body>


</html>
