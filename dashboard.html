<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | Content Intelligence AI</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<header>

    <div class="container nav">

        <div class="logo">

            Content Intelligence AI

        </div>

        <nav>

            <a href="index.html">Home</a>

            <a href="#">Projects</a>

            <a href="#">Templates</a>

            <a href="#">Account</a>

        </nav>

    </div>

</header>



<main class="container">

<section class="section">

<h2>

AI Content Studio

</h2>

<div class="dashboard-grid">

<div class="dashboard-panel">

<label>

Content Idea

</label>

<textarea
id="topic"
placeholder="Example:

Launching our new Christian hoodie collection.

The message is Stand Firm.

Designed for Christian men wanting to wear their faith."
></textarea>



<label>

Audience

</label>

<input
type="text"
id="audience"
placeholder="Christian Men 25-45"
/>



<label>

Goal

</label>

<select id="goal">

<option>Brand Awareness</option>

<option>Engagement</option>

<option>Website Traffic</option>

<option>Lead Generation</option>

<option>Sales</option>

</select>



<label>

Tone

</label>

<select id="tone">

<option>Inspirational</option>

<option>Professional</option>

<option>Educational</option>

<option>Friendly</option>

<option>Bold</option>

<option>Encouraging</option>

</select>



<h3>

Platforms

</h3>

<div class="platform-selector">

<label>

<input
type="checkbox"
value="Facebook"
checked>

Facebook

</label>

<label>

<input
type="checkbox"
value="Instagram"
checked>

Instagram

</label>

<label>

<input
type="checkbox"
value="LinkedIn">

LinkedIn

</label>

<label>

<input
type="checkbox"
value="Pinterest">

Pinterest

</label>

<label>

<input
type="checkbox"
value="TikTok"
checked>

TikTok

</label>

<label>

<input
type="checkbox"
value="Threads">

Threads

</label>

<label>

<input
type="checkbox"
value="X">

X

</label>

<label>

<input
type="checkbox"
value="YouTube">

YouTube

</label>

</div>



<button
id="generateButton"
class="primary-button">

Generate Content

</button>

</div>





<div class="dashboard-results">

<div id="results">

<div class="placeholder">

<h3>

Your AI content will appear here.

</h3>

<p>

Choose your platforms and click Generate Content.

</p>

</div>

</div>

</div>

</div>

</section>

</main>



<script src="js/dashboard.js"></script>

</body>

</html>
