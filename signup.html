<body>


<header>

<div class="container nav">


<div class="logo">

Content Intelligence AI

</div>



<nav>

<a href="index.html">

</a>

Pricing

</a>

</a>


</nav>


</div>

<main>


<section class="section">


<div class="container">


<div class="auth-card">


<h2>

Create Your Account

</h2>


<p>

Start creating platform-specific AI content today.

</p>




<form id="signupForm">



<label>

Full Name

</label>


<input

type="text"

id="name"

placeholder="Your name"

required

>




<label>

Email Address

</label>


<input

type="email"

id="email"

placeholder="you@example.com"

required

>




<label>

Password

</label>


<input

type="password"

id="password"

placeholder="Create a password"

required

>



<button

type="submit"

class="primary-button"

>

Create Account

</button>



</form>



<p class="auth-footer">

Already have an account?

<a href="login.html">

Login

</a>

</p>



</div>


</div>


</section>


</main>





<footer>


<div class="container footer">


<div>

© 2026 Content Intelligence AI

</div>


</div>


</footer>

document

.getElementById("signupForm")

.addEventListener("submit",function(e){

);
